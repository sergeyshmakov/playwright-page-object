version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "UTC"
    allow:
      - dependency-type: "direct"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      npm-production:
        dependency-type: "production"
      npm-development:
        dependency-type: "development"
    ignore:
      - dependency-name: "@types/node*"
        versions: [ ">=24" ]
      - dependency-name: "lint-staged"
        versions: [ ">=17" ]
      - dependency-name: "typescript"
        versions: [ ">=6" ]
      # concurrently >=10 requires Node 22; project floor is Node >=20.
      - dependency-name: "concurrently"
        versions: [ ">=10" ]
      # vitest >=4.1 breaks the test suite (7 of 9 files fail to load); revisit when fixed.
      - dependency-name: "vitest"
        versions: [ ">=4.1" ]

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "UTC"
    allow:
      - dependency-type: "direct"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docs"
    groups:
      docs-deps:
        patterns:
          - "*"
    ignore:
      - dependency-name: "lint-staged"
        versions: [ ">=17" ]
      - dependency-name: "typescript"
        versions: [ ">=6" ]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
