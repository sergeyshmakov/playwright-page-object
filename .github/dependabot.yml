version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "UTC"
    allow:
      - dependency-type: "direct"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      npm-production:
        dependency-type: "production"
      npm-development:
        dependency-type: "development"
    ignore:
      - dependency-name: "@types/node*"
        versions: [ ">=24" ]
      - dependency-name: "lint-staged"
        versions: [ ">=17" ]
      - dependency-name: "typescript"
        versions: [ ">=6" ]
      # concurrently >=10 requires Node 22; project floor is Node >=20.
      - dependency-name: "concurrently"
        versions: [ ">=10" ]
      # @babel/plugin-proposal-decorators >=8 drops the "2023-05" version that
      # matches TypeScript's shipped decorator semantics; "2023-11" breaks
      # parameter-property classes. Stay on v7 for the vitest babel transform.
      - dependency-name: "@babel/plugin-proposal-decorators"
        versions: [ ">=8" ]

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "UTC"
    allow:
      - dependency-type: "direct"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docs"
    groups:
      docs-deps:
        patterns:
          - "*"
    ignore:
      - dependency-name: "lint-staged"
        versions: [ ">=17" ]
      - dependency-name: "typescript"
        versions: [ ">=6" ]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
