name: Bug report
description: Something isn't working as expected
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the form below so we can reproduce and fix it quickly.

        Before opening, please check the [troubleshooting guide](https://sergeyshmakov.github.io/playwright-page-object/reference/troubleshooting/) — your issue may already be covered.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what is wrong.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Steps to reproduce. Ideally a small code snippet or a link to a minimal repository.
      render: ts
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 2.0.0
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, Playwright version, OS.
      placeholder: Node 20.x, @playwright/test 1.49.0, macOS 14
    validations:
      required: true
