name: Feature request
description: Suggest a new capability or improvement
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. Please describe the problem you are trying to solve before jumping to a solution — it helps us evaluate alternatives.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear statement of the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would the API or behavior change? Code snippets welcome.
      render: ts
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative designs you've thought about.
