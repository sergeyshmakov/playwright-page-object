name: PR Check
on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check Formatting & Linting
        run: npm run lint
        
      - name: Run Tests
        run: npm run test
        
      - name: Test Build
        run: npm run build
