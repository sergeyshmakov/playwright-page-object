name: PR Check
on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check Formatting & Linting
        run: npm run lint
        
      - name: Run Tests
        run: npm run test
        
      - name: Test Build
        run: npm run build

      - name: Test Example
        run: npm run test:example
